  <style>
  .menu-toggle {
      display: none;
      cursor: pointer;
    }

    .menu {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #2c2c2c;
      padding: 0.5em;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 2;
    }

    .menu label {
      color: #fff;
      transition: color 0.3s ease-out;
      font-family: 'Comfortaa', cursive;
    }

    .menu label:hover {
      color: #808080;
    }

    .menu a {
      color: #fff;
      text-decoration: none;
      margin: 0 15px;
      transition: color 0.3s ease-out;
      font-family: 'Comfortaa', cursive;
    }

    .menu a:hover {
      color: #808080;
    }

    .menu i {
      margin-right: 5px;
    }

    .menu-list {
      display: flex;
      list-style: none;
      padding: 0;
      margin: 0;
      transform: translateY(-100%);
      opacity: 0;
      transition: transform 0.3s ease-out, opacity 0.3s ease-out;
    }

    .menu-list.show {
      transform: translateY(0);
      opacity: 1;
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background-color: #2c2c2c;
      padding: 0.5em;
      z-index: 3;
    }

    .menu-list li {
      margin: 0 10px;
    }

    .menu-list li:first-child {
      margin-left: 0;
    }

    .menu-toggle:checked + .menu .menu-list {
      transform: translateY(0);
      opacity: 1;
    }

    /* Затемнение фона */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5); /* Измените значение альфа-канала по вашему вкусу */
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s, visibility 0s linear 0.3s;
      z-index: 1;
    }

    .menu-toggle:checked ~ .overlay {
      visibility: visible;
      opacity: 1;
      transition: opacity 0.3s;
    }

    /* Added */
    .avatar {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      overflow: hidden;
      width: 100px;
      height: 100px;
      margin-bottom: 40px; /* Increased margin */

      margin-bottom: 40px;
    }

    .bio {

    }
</style>
<style>
    .loader {
      position: fixed;

      width: 100%;
      height: 100%;
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.3s ease-out;
    }

    .loader video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .loader.hide {
      opacity: 0;

</style>

  <script>
    const loader = document.querySelector('.loader');
    const video = document.querySelector('.loader video');

    // Check if the page is being loaded for the first time or being refreshed
    if (performance.navigation.type === 1) {
      // Page is being refreshed, hide the loader immediately
      loader.classList.add('hide');
    } else {
      // Page is being loaded for the first time, show the loader until the video is loaded
      window.addEventListener('load', function() {
        loader.classList.remove('hide');
      });

      video.addEventListener('loadedmetadata', function() {
        video.addEventListener('play', function() {
          loader.classList.add('hide');
        }, { once: true });
      });

      video.addEventListener('error', function() {
        loader.classList.add('hide');
      });

      video.addEventListener('ended', function() {
        loader.classList.add('hide');
      });

      window.addEventListener('beforeunload', function() {
        video.pause();
        video.currentTime = 0;
      });
    }
  </script>
