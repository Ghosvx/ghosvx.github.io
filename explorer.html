<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-image: url("/pic/backexplorer.png");
            background-size: cover;
        }
        
        .file-icon {
            font-size: 24px;
            margin-right: 10px;
        }
        
        .file-list {
            list-style-type: none;
            padding: 0;
        }
        
        .file-list li {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .file-list li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
        
        .file-list li a:hover {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <h1>File Explorer</h1>
    
    <ul class="file-list"></ul>
        <!-- BEGIN: Dynamically generate file list -->
        <li>
            <i class="file-icon fas fa-file"></i>
            <a href="/explorer/file1.txt">file1.txt</a>
        </li>
        <li>
            <i class="file-icon fas fa-file"></i>
            <a href="/explorer/file2.jpg">file2.jpg</a>
        </li>
        <li>
            <i class="file-icon fas fa-file"></i>
            <a href="/explorer/file3.pdf">file3.pdf</a>
        </li>
        <!-- END: Dynamically generate file list -->
    </ul>
</body>
</html>
