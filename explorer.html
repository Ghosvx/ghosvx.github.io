<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background-image: url("/pic/backexplorer.png");
            background-size: cover;
            background-color: #ffffff; /* White color for better visibility */
        }
        
        .file-icon {
            font-size: 24px;
            margin-right: 10px;
        }
        
        .file-list {
            list-style-type: none;
            padding: 0;
        }
        
        .file-list li {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-in-out;
        }
        
        .file-list li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: color 0.3s ease-in-out;
        }
        
        .file-list li a:hover {
            color: #ff0000;
        }
        
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <h1>File Explorer</h1>
    
    <ul class="file-list"></ul>
        <!-- BEGIN: Dynamically generate file list -->
        <li>
            <i class="file-icon fas fa-file"></i>
            <a href="/explorer/file1txt">file1.txt</a>
        </li>
        <li>
            <i class="file-icon fas fa-file"></i>
            <a href="/explorer/file2jpg">file2.jpg</a>
        </li>
        <li>
            <i class="file-icon fas fa-file"></i>
            <a href="/explorer/file3pdf">file3.pdf</a>
        </li>
        <!-- END: Dynamically generate file list -->
    </ul>
</body>
</html>
