    <style>
        body {
            background-image: url("/pic/backexplorer.png");
            background-size: cover;
            color: #ffffff; /* White color for better visibility */
            text-align: center; /* Center align the text */
            font-family: 'Ubuntu', sans-serif; /* Use Ubuntu font */
        }
        
        .file-icon {
            font-size: 24px;
            margin-right: 10px;
        }
        
        .file-list {
            list-style-type: none;
            padding: 0;
            display: flex; /* Display files in a row */
            flex-wrap: wrap; /* Wrap files to the next line */
        }
        
        .file-list li {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-in-out;
            flex-basis: 20%; /* Set each file to occupy 20% of the container width */
        }
        
        .file-list li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-family: 'Raleway', sans-serif; /* Use Raleway font */
            transition: color 0.3s ease-in-out;
        }
        
        .file-list li a:hover {
            color: #0051ff;
        }
        
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <h1>Файловый проводник сайта</h1>
    <ul class="file-list">

        </li>
        <!-- END: Dynamically generate file list -->
    </ul>
</body>
</html>
