<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.50">
  <link rel="icon" type="image/x-icon" href="/pic/favicon.ico">
  <title>Ghosvx</title>
  <link rel="stylesheet" href="/css/styles_index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300&family=Raleway:wght@200&family=Ubuntu:wght@300&display=swap" rel="stylesheet">

<style>
    body {
        background-image: url("/pic/backexplorer.png");
        background-repeat: no-repeat;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Ubuntu', Arial, sans-serif; /* Updated font-family */
    }

    .container {
        background-color: #000;
        border-radius: 5px;
        padding: 20px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        width: 300px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        color: #fff;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 3px;
    }

    .form-group button {
        width: 100%;
        padding: 10px;
        background-color: #4CAF50;
        color: #fff;
        border: none;
        border-radius: 3px;
        cursor: pointer;
    }

    .form-group button:hover {
        background-color: #45a049;
    }

    .error-message {
        color: red;
        font-size: 14px;
        margin-top: 10px;
    }

    #login-form {
        display: none; /* Hide the login form */
    }

    #file-explorer {
        display: block; /* Show the file explorer */
    }
</style>


<div id="file-explorer">
    <!-- File explorer content goes here -->
</div>

<div class="container">
    <!-- Removed the login form -->
    <div id="error-message" class="error-message"></div>
</div>

<script>
    // Removed the login form JavaScript code
</script>
