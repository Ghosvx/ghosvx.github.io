<!DOCTYPE html>
<html>
<head>
    <title>Sagarius - Biography</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(black, rgb(123, 123, 163)); /* Set background gradient from black to rgb(123, 123, 163) */
        }
        
        section {
            background-color: #222; /* Set background color to a slightly lighter shade of black */
            border: 2px solid white; /* Set border color to white */
            padding: 20px;
            text-align: center;
            width: 400px; /* Set width to 400px */
            color: white; /* Set text color to white */
            border-radius: 10px; /* Add rounded corners to the section */
            font-family: 'Ubuntu', sans-serif;
        }
        
        .social-buttons {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        
        .social-button {
            margin: 0 10px;
            background-color: #1e90ff; /* Set background color to a nice blue */
            color: white; /* Set text color to white */
            padding: 10px 20px; /* Add padding to the buttons */
            border-radius: 5px; /* Add rounded corners to the buttons */
            text-decoration: none; /* Remove underline from the buttons */
        }
        
        .social-button i {
            margin-right: 5px;
        }
        
        img {
            border-radius: 50%; /* Add rounded corners to the image */
            margin-top: -50px; /* Move the image slightly above the section */
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <section>
            <img src="/pic/doc_2023-12-31_18-19-27.gif" alt="Komaru Gif" width="200" height="200">
            <h1>Sagarius</h1>
            <div class="social-buttons">
                <a href="#" class="social-button"><i class="fab fa-facebook-f"></i>Facebook</a>
                <a href="#" class="social-button"><i class="fab fa-twitter"></i>Twitter</a>
                <a href="#" class="social-button"><i class="fab fa-instagram"></i>Instagram</a>
                <a href="#" class="social-button"><i class="fab fa-linkedin-in"></i>LinkedIn</a>
            </div>
    </section>
</body>
</html>
