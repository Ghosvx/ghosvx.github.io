<!DOCTYPE html>
<html>
<head>
    <title>My Beautiful Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url(pic/xd.png) no-repeat center center fixed;
            background-size: cover;
        }
        
        .section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid #ccc;
        }
        
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .profile img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        
        .social-links a {
            margin: 0 10px;
            color: #000;
            text-decoration: none;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <section class="section">
        <div class="profile">
            <img src="/pic/xd.png" alt="Profile Picture">
            <h2>John Doe</h2>
        </div>
        <div class="social-links">
            <a href="https://www.facebook.com/johndoe" target="_blank">Facebook</a>
            <a href="https://www.twitter.com/johndoe" target="_blank">Twitter</a>
            <a href="https://www.instagram.com/johndoe" target="_blank">Instagram</a>
        </div>
    </section>
</body>
</html>
