<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ну это вообще пиздец</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Ubuntu', sans-serif;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgb(123, 123, 163), black);
            opacity: 0.5;
            z-index: -1;
        }

        .section {
            width: 400px;
            font-family: 'Ubuntu', sans-serif;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(50, 50, 50, 0.5);
            border-radius: 10px;
            border: 2px solid black;
            margin: 0 auto;
            margin-top: 50px;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 1;
        }

        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .social-links a {
            margin: 0 10px;
            text-decoration: none;
            font-size: 20px;
            padding: 10px;
            border-radius: 5px;
            border: 2px solid #000;
        }

        /* Facebook */
        .social-links a:nth-child(1) {
            background-color: #3b5998;
            color: #fff;
        }

        /* Twitter */
        .social-links a:nth-child(2) {
            background-color: #1da1f2;
            color: #fff;
        }

        /* Instagram */
        .social-links a:nth-child(3) {
            background-color: #c32aa3;
            color: #fff;
        }

        /* Sagarius */
        .profile h2 {
            background: linear-gradient(to right, rgb(255, 0, 0), rgb(0, 255, 0), rgb(0, 0, 255));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <section class="section">
        <div class="profile">
            <img src="/pic/doc_2023-12-31_18-19-27.gif" alt="Profile Picture">
            <h2>Sagarius</h2>
        </div>
        <div class="social-links">
            <a href="https://t.me/ghosvx" target="_blank">Facebook</a>
            <a href="https://t.me/ghosvx" target="_blank">Twitter</a>
            <a href="https://t.me/ghosvx" target="_blank">Instagram</a>
        </div>
    </section>
</body>
</html>
