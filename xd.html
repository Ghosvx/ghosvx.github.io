<!DOCTYPE html>
<html>
<head>
    <title>Sagarius - Biography</title>
    <style>
        section {
            background-color: black; /* Set background color to black */
            border: 2px solid white; /* Set border color to white */
            padding: 20px;
            text-align: center;
            height: 400px; /* Set height to 400px */
            color: white; /* Set text color to white */
            border-radius: 10px; /* Add rounded corners to the section */
        }
        
        .social-buttons {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        
        .social-button {
            margin: 0 10px;
            background-color: #1e90ff; /* Set background color to a nice blue */
            color: white; /* Set text color to white */
            padding: 10px 20px; /* Add padding to the buttons */
            border-radius: 5px; /* Add rounded corners to the buttons */
            text-decoration: none; /* Remove underline from the buttons */
        }
        
        .social-button i {
            margin-right: 5px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <section>
        <header>
            <img src="/pic/doc_2023-12-31_18-19-27.gif" alt="Sagarius" width="200" height="200">
            <h1>Sagarius</h1>
            <p>Biography</p>
            <div class="social-buttons">
                <a href="#" class="social-button"><i class="fab fa-facebook-f"></i>Facebook</a>
                <a href="#" class="social-button"><i class="fab fa-twitter"></i>Twitter</a>
                <a href="#" class="social-button"><i class="fab fa-instagram"></i>Instagram</a>
                <a href="#" class="social-button"><i class="fab fa-linkedin-in"></i>LinkedIn</a>
            </div>
        </header>
    </section>
</body>
</html>
