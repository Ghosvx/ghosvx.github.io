<!DOCTYPE html>
<html>
<head>
    <title>Sagarius BIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="xd.ico">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(black, rgb(123, 123, 163)); /* Set background gradient from black to rgb(123, 123, 163) */
        }
        
        section {
            background-color: #222; /* Set background color to a slightly lighter shade of black */
            border: 2px solid white; /* Set border color to white */
            padding: 20px;
            text-align: center;
            width: 100%; /* Set width to 100% */
            max-width: 400px; /* Set max-width to 400px */
            color: white; /* Set text color to white */
            border-radius: 10px; /* Add rounded corners to the section */
            font-family: 'Ubuntu', sans-serif;
            animation: fadeIn 1s ease-in-out; /* Add fade-in animation */
        }
        
        .social-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        
        .social-row {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            animation: slideInLeft 1s ease-in-out; /* Add slide-in animation */
        }

        .social-button {
            margin: 5px;
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 150px;
            width: 100%;
            animation: fadeIn 1s ease-in-out; /* Add fade-in animation */
        }
        
        .social-button i {
            margin-right: 5px;
        }
        
        .telegram-button {
            background-color: #0088cc;
        }
        
        .discord-button {
            background-color: #7289da;
        }
        
        .steam-button {
            background-color: #01002e;
        }
        
        .tiktok-button {
            background-color: #e200b1;
        }
        
        .copy-button {
            background-color: rgb(93, 34, 255);
            color: black;
            width: 100%;
        }
        
        img.komaru-gif {
            border-radius: 50%;
            margin-top: -50px;
            animation: rotate 2s linear; /* Add rotation animation */
            animation-fill-mode: forwards; /* Keep the final state of the animation */
        }
        
        .custom-msgbox {
            background-color: #333;
            border: 2px solid white;
            padding: 20px;
            text-align: center;
            width: 100%; /* Set width to 100% */
            max-width: 400px; /* Set max-width to 400px */
            color: white;
            border-radius: 10px;
            font-family: 'Ubuntu', sans-serif;
            display: none;
            animation: slideInBottom 1s ease-in-out; /* Add slide-in animation */
        }
        
        .custom-msgbox.show {
            display: block;
        }
        
        .custom-msgbox h2 {
            margin-bottom: 10px;
        }
        
        .custom-msgbox p {
            margin-bottom: 20px;
        }
        
        .custom-msgbox button {
            margin: 0 auto;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            background-color: #0088cc;
            border: none;
            cursor: pointer;
            font-family: 'Ubuntu', sans-serif;
            font-size: 16px;
            animation: fadeIn 1s ease-in-out; /* Add fade-in animation */
        }
        
        .donate-button {
            background-color: #ff4081;
            color: white;
            padding: 10px 40px;
            border-radius: 20px;
            text-decoration: none;
            font-family: 'Ubuntu', sans-serif;
            font-size: 16px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite; /* Add pulse animation */
        }
        
        .donate-button i {
            margin-right: 5px;
        }
        
        .donate-row {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        
        .donation-image {
            margin-top: 10px;
            width: 200px;
            height: 200px;
            border-radius: 50%; /* Add border-radius to round the image */
        }
        
        .qiwi-button {
            background-color: rgb(197, 128, 0);
        }
        
        .ton-button {
            background-color: #004161;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes slideInLeft {
            from {
                transform: translateX(-100%);
            }
            to {
                transform: translateX(0);
            }
        }
        
        @keyframes slideInBottom {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        /* Mobile optimization */
        @media only screen and (max-width: 600px) {
            section {
                max-width: 90%; /* Adjust max-width for smaller screens */
                padding: 10px; /* Adjust padding for smaller screens */
            }
            
            img.komaru-gif {
                width: 150px; /* Adjust width for smaller screens */
                height: 150px; /* Adjust height for smaller screens */
            }
            
            .donation-image {
                width: 150px; /* Adjust width for smaller screens */
                height: 150px; /* Adjust height for smaller screens */
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <section>
        <img src="komaru.gif" alt="Komaru Gif" width="200" height="200" class="komaru-gif">
        <h1>Sagarius</h1>
        <div class="social-buttons">
            <div class="social-row">
                <a href="tg://user?id=936463360" class="social-button telegram-button"><i class="fab fa-telegram"></i>Telegram</a>
                <a href="https://discordapp.com/users/608241040595484707/" class="social-button discord-button"><i class="fab fa-discord"></i>Discord</a>
            </div>
            <div class="social-row">
                <a href="https://steamcommunity.com/id/verlity" class="social-button steam-button"><i class="fab fa-steam-symbol"></i>Steam</a>
                <a href="https://www.tiktok.com/@MS4wLjABAAAApRvVcarin5g_OJVBsRwnlGsX-QIdYgLsyX8ZtuICVwtQlMHjO3PsPde4CnLpRLjD?_t=8ieM6R6bnCd&_r=1" class="social-button tiktok-button"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
        <div class="donate-row">
            <button class="donate-button" onclick="showCustomMessageBox()"><i class="fas fa-donate"></i>Donate</button>
        </div>
    </section>
    
    <div class="custom-msgbox">
        <h2>Info for donate</h2>
        <p>Donations only go one way and you don’t have to wait for a refund!</p>
        <button onclick="copyToClipboard('HECKER459')" class="qiwi-button">Copy QIWI Name</button>
        <button onclick="copyToClipboard('EQAnUm6XFajM7NjDGzPXYopDcqBTBWMyPjiCfP718j69ffpa')" class="ton-button">Copy TON Address</button>
        <div class="donate-row">
            <button onclick="closeCustomMessageBox()">Close</button>
        </div>
        <img src="https://media.tenor.com/qSHC5BriKGsAAAAM/cat-money.gif" alt="Cat Money Gif" class="donation-image">
    </div>
    
    <script>
        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }
    
        function showCustomMessageBox() {
            const msgBox = document.querySelector('.custom-msgbox');
            msgBox.classList.add('show');
        }
        
        function closeCustomMessageBox() {
            const msgBox = document.querySelector('.custom-msgbox');
            msgBox.classList.remove('show');
        }
    </script>
</body>
</html>
