<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(black, rgb(123, 123, 163)); /* Set background gradient from black to rgb(123, 123, 163) */
        }
        
        section {
            background-color: #222; /* Set background color to a slightly lighter shade of black */
            border: 2px solid white; /* Set border color to white */
            padding: 20px;
            text-align: center;
            width: 400px; /* Set width to 400px */
            color: white; /* Set text color to white */
            border-radius: 10px; /* Add rounded corners to the section */
            font-family: 'Ubuntu', sans-serif;
        }
        
        .social-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        
        .social-row {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .social-button {
            margin: 0 10px;
            padding: 10px 20px; /* Add padding to the buttons */
            border-radius: 5px; /* Add rounded corners to the buttons */
            text-decoration: none; /* Remove underline from the buttons */
            color: white; /* Set text color to white */
        }
        
        .social-button i {
            margin-right: 5px;
        }
        
        .telegram-button {
            background-color: #0088cc; /* Set background color to Telegram logo color */
        }
        
        .discord-button {
            background-color: #7289da; /* Set background color to Discord logo color */
        }
        
        .steam-button {
            background-color: #01002e; /* Set background color to Steam logo color */
        }
        
        .tiktok-button {
            background-color: #e200b1; /* Set background color to TikTok logo color */
        }
        
        .copy-button {
            background-color: rgb(93, 34, 255); /* Set background color to white */
            color: black; /* Set text color to black */
            width: 100%; /* Set the width of the button to 100% */
        }
        
        img {
            border-radius: 50%; /* Add rounded corners to the image */
            margin-top: -50px; /* Move the image slightly above the section */
        }
        
        .custom-msgbox {
            background-color: #333; /* Set background color to a darker shade of black */
            border: 2px solid white; /* Set border color to white */
            padding: 20px;
            text-align: center;
            width: 400px; /* Set width to 400px */
            color: white; /* Set text color to white */
            border-radius: 10px; /* Add rounded corners to the section */
            font-family: 'Ubuntu', sans-serif;
            display: none; /* Hide the message box by default */
        }
        
        .custom-msgbox.show {
            display: block; /* Show the message box when the show class is added */
        }
        
        .custom-msgbox h2 {
            margin-bottom: 10px;
        }
        
        .custom-msgbox p {
            margin-bottom: 20px;
        }
        
        .custom-msgbox button {
            margin: 0 auto;
            padding: 10px 20px; /* Add padding to the buttons */
            border-radius: 20px; /* Add rounded corners to the buttons */
            text-decoration: none; /* Remove underline from the buttons */
            color: white; /* Set text color to white */
            background-color: #0088cc; /* Set background color to Telegram logo color */
            border: none; /* Remove border from the buttons */
            cursor: pointer; /* Change cursor to pointer on hover */
            font-family: 'Ubuntu', sans-serif;
            font-size: 16px; /* Set font size to 16px */
        }
        
        .donate-button {
            background-color: #ff4081; /* Set background color to a pink shade */
            color: white; /* Set text color to white */
            padding: 10px 40px; /* Add padding to the button */
            border-radius: 20px; /* Add rounded corners to the button */
            text-decoration: none; /* Remove underline from the button */
            font-family: 'Ubuntu', sans-serif;
            font-size: 16px; /* Set font size to 16px */
            border: none; /* Remove border from the button */
            cursor: pointer; /* Change cursor to pointer on hover */
            display: inline-flex; /* Display the button as inline-flex */
            align-items: center; /* Align items vertically */
        }
        
        .donate-button i {
            margin-right: 5px; /* Add margin to the right of the icon */
        }
        
        .donate-row {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        
        .donation-image {
            margin-top: 10px;
            width: 200px;
            height: 200px;
        }
        
        .qiwi-button {
            background-color: rgb(197, 128, 0); /* Set background color to orange */
        }
        
        .ton-button {
            background-color: #004161; /* Set background color to Telegram logo color */
        }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }
    
        function showCustomMessageBox() {
            const msgBox = document.querySelector('.custom-msgbox');
            msgBox.classList.add('show');
        }
        
        function closeCustomMessageBox() {
            const msgBox = document.querySelector('.custom-msgbox');
            msgBox.classList.remove('show');
        }
    </script>
</head>
