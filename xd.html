    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(black, rgb(123, 123, 163)); /* Set background gradient from black to rgb(123, 123, 163) */
        }
        
        section {
            background-color: #222; /* Set background color to a slightly lighter shade of black */
            border: 2px solid white; /* Set border color to white */
            padding: 20px;
            text-align: center;
            width: 400px; /* Set width to 400px */
            color: white; /* Set text color to white */

        }
        
        .social-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .social-button {
            margin: 0 10px;
            padding: 10px 20px; /* Add padding to the buttons */
            border-radius: 5px; /* Add rounded corners to the buttons */
            text-decoration: none; /* Remove underline from the buttons */
            color: white; /* Set text color to white */
        }
        
        .social-button i {
            margin-right: 5px;
        }
        
        .telegram-button {
            background-color: #0088cc; /* Set background color to Telegram logo color */
        }
        
        .discord-button {
            background-color: #7289da; /* Set background color to Discord logo color */
        }
        
        .steam-button {
            background-color: #000000; /* Set background color to Steam logo color */
        }
        
        .tiktok-button {
            background-color: #000000; /* Set background color to TikTok logo color */
        }
        
        .copy-button {
            background-color: white; /* Set background color to white */
            color: black; /* Set text color to black */
            width: 100%; /* Set the width of the button to 100% */
        }
        
        img {
            border-radius: 50%; /* Add rounded corners to the image */
            margin-top: -50px; /* Move the image slightly above the section */
        }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }
    </script>
