    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #container {
            overflow-y: scroll;
            height: 100vh;
            padding-right: 17px; /* Add space for scrollbar */
        }

    <style>
        body {
            font-family: 'Ubuntu', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #333;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .menu-toggle {
            display: none;
            cursor: pointer;
        }

        .menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c2c2c;
            padding: 0.5em;
            position: relative;
            z-index: 2;
        }

        .menu label {
            color: #fff;
            transition: color 0.3s ease-out;
            cursor: pointer;
        }

        .menu label:hover {
            color: #808080;
        }

        .menu a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            transition: color 0.3s ease-out;
        }

        .menu a:hover {
            color: #808080;
        }

        .menu i {
            margin-right: 5px;
        }

        .menu-list {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            transform: translateY(-100%);
            opacity: 0;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }

        .menu-list.show {
            transform: translateY(0);
            opacity: 1;
        }

        .menu-list li {
            margin: 0 10px;
        }

        .menu-list li:first-child {
            margin-left: 0;
        }

        .menu-toggle:checked+.menu .menu-list {
            transform: translateY(0);
            opacity: 1;
        }

        /* Затемнение фона */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            /* Измените значение альфа-канала по вашему вкусу */
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s, visibility 0s linear 0.3s;
            z-index: 1;
        }

        .menu-toggle:checked~.overlay {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.3s;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background-color: #2c2c2c;
            padding-top: 20px;
            transition: 0.5s;
        }

        .side-menu ul {
            list-style: none;
            padding: 0;
        }

        .side-menu li {
            margin-bottom: 10px;
        }

        .side-menu a {
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            display: block;
            padding: 10px;
            transition: 0.3s;
        }

        .side-menu a:hover {
            background-color: #555;
        }
    </style>

</head>
