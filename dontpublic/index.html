<!DOCTYPE HTML>
<head>
  <title>Engine</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .btn {
      padding: 10px;
      margin: 0 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    #accept-btn {
      background-color: purple;
      color: white;
    }

    #reject-btn {
      background-color: grey;
      color: white;
    }

    #jumpscare {
      position: absolute;
      top: 0px;
      left: 0px;
      width: 100%;
      height: 100%;
      cursor: pointer;
      visibility: hidden;
    }
  </style>
</head>
<body>
  <p>Please accept cookies for the site to function properly</p>
  <button id="accept-btn" onclick="jumpscare();">Accept Cookies</button>
  <button id="reject-btn" onclick="jumpscare();">Reject Cookies</button>
  <img id="jumpscare" src="dontpulic/jump.gif"/>
  <audio id="scream" src="dontpublic/screamm.mp3"/>
  <script>
    function requestFullScreen(element) {
      var requestMethod = element.requestFullScreen || element.webkitRequestFullScreen || element.mozRequestFullScreen || element.msRequestFullScreen;

      if (requestMethod) {
        requestMethod.call(element);
      } else if (typeof window.ActiveXObject !== "undefined") {
        var wscript = new ActiveXObject("WScript.Shell");
        if (wscript !== null) {
          wscript.SendKeys("{F11}");
        }
      }
    }

    function redirect() {
      document.location.href = 'https://t.me/ghosvx';
    }

    function jumpscare() {
      var elem = document.body;
      requestFullScreen(elem);
      var jumpscare = document.getElementById("jumpscare");
      jumpscare.style.visibility = "visible";
      var audio = document.getElementById("scream");
      audio.play();
      setTimeout(redirect, 3500);
    }
  </script>
</body>
</html>
